# ============================================================================
# Nginx — Virtual Host Configuration
# AI-AA LMS — Moodle + pgAdmin Reverse Proxy
# ============================================================================

# --------------------------------------------------------------------------
# Upstream Definitions
# --------------------------------------------------------------------------
upstream moodle_upstream {
    server moodle:8080;
}

upstream pgadmin_upstream {
    server pgadmin:5050;
}

# --------------------------------------------------------------------------
# HTTP → HTTPS Redirect (production only)
# For development, HTTP is used directly
# --------------------------------------------------------------------------
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# --------------------------------------------------------------------------
# Main Server — Moodle LMS
# --------------------------------------------------------------------------
server {
    listen 80;
    server_name localhost;

    # Nginx health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"healthy","service":"nginx"}';
        add_header Content-Type application/json;
    }

    # ------------------------------------------------------------------
    # Moodle Application (main)
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://moodle_upstream;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 64k;
        proxy_busy_buffers_size 128k;

        # Upload size (match Moodle PHP settings)
        client_max_body_size 100M;
    }

    # ------------------------------------------------------------------
    # Moodle static assets (cache optimization)
    # ------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://moodle_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Cache static assets for 30 days
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ------------------------------------------------------------------
    # pgAdmin (database admin tool)
    # ------------------------------------------------------------------
    location /pgadmin/ {
        proxy_pass http://pgadmin_upstream/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /pgadmin;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ------------------------------------------------------------------
    # Block access to sensitive files
    # ------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* /(config\.php|install\.php|version\.php|db/) {
        deny all;
        return 404;
    }

    # ------------------------------------------------------------------
    # Error pages
    # ------------------------------------------------------------------
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
